<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Vielen Dank – LAK Cleaning Service Berlin</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .danke-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .danke-box {
      max-width: 560px;
    }
    .danke-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .danke-box h1 {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .danke-box p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      margin-bottom: 32px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <nav class="navbar" style="padding: 16px 0;">
    <div class="container nav-inner" style="display:flex; align-items:center; padding: 0 32px;">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="LAK Cleaning Service Logo" class="nav-logo-img" />
      </a>
    </div>
  </nav>

  <section class="danke-section">
    <div class="danke-box">
      <div class="danke-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>Vielen Dank für Ihre Anfrage!</h1>
      <p>Wir haben Ihre Nachricht erhalten und melden uns <strong>innerhalb von 24 Stunden</strong> bei Ihnen zurück.</p>
      <a href="index.html" class="btn-primary">Zurück zur Startseite</a>
    </div>
  </section>
</body>
</html>
